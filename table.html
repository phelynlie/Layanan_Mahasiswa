<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Layanan Mahasiswa</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar-inner">
      <span class="brand">📋 Layanan Mahasiswa</span>
      <nav class="nav-links">
        <a href="index.html">Form Input</a>
        <a href="table.html" class="active">Data Layanan</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Data Permintaan Layanan</h1>
      <p class="subtitle">Daftar seluruh data yang telah diinput melalui form.</p>

      <div class="table-toolbar">
        <input type="text" id="searchInput" placeholder="🔍 Cari nama / NIM / jenis layanan..." />
        <button id="btnHapusSemua" class="btn-danger">Hapus Semua Data</button>
      </div>

      <div class="table-wrapper">
        <table id="dataTable">
          <thead>
            <tr>
              <th>No</th>
              <th>Nama</th>
              <th>NIM</th>
              <th>Jenis Layanan</th>
              <th>Keterangan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Data akan diisi otomatis oleh JavaScript -->
          </tbody>
        </table>
      </div>

      <p id="emptyMsg" class="empty-msg" style="display:none;">Belum ada data. Silakan tambahkan data melalui halaman Form Input.</p>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Sistem Layanan Mahasiswa — Tugas Kuliah</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
